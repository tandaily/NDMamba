# general settings
name: NDMamba
model_type: ImageCleanModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: Dataset_Night_Deraining
    dataroot_gt: /mnt/nighttime_derain_data/GTAV-NightRain/train/gt
    dataroot_lq: /mnt/nighttime_derain_data/GTAV-NightRain/train/rainy
    geometric_augs: true

    filename_tmpl: '{}'
    io_backend:
      type: disk

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8


    ## ------- Training on single fixed-patch size 256x256---------
    mini_batch_sizes: [8]
    iters: [300000]
    gt_size: 256
    gt_sizes: [256]
    ## ------------------------------------------------------------

    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet
    type: Dataset_Night_Deraining
    dataroot_gt: /mnt/nighttime_derain_data/GTAV-NightRain/test/gt
    dataroot_lq: /mnt/nighttime_derain_data/GTAV-NightRain/test/rainy
    io_backend:
      type: disk

# network structures
network_g:
  type: NDMamba
  inp_channels: 3
  out_channels: 3
  dim: 24
  num_blocks: [2,3,3,4]
  num_refinement_blocks: 4
  ffn_expansion_factor: 1.667
  bias: False
  LayerNorm_type: WithBias


# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 300000
  warmup_iter: -1 # no warm up
  use_grad_clip: true

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [80000, 220000]
    restart_weights: [1,1]
    eta_mins: [0.0001,0.000001]
  
  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  optim_g:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  
  # losses
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean
    eps: !!float 1e-3

# validation settings
val:
  window_size: 8
  val_freq: !!float 2e3
  save_img: false
  rgb2bgr: true
  use_image: true
  max_minibatch: 8

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
